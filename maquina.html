      border-radius:999px;
      background:rgba(34,197,94,0.14);
      color:#86efac;
      font-size:13px;
      font-weight:700;
      margin-bottom:14px;
      letter-spacing:0.2px;
    }

    }

    .machine-label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1px;
      font-weight:700;
      opacity:0.85;
      margin-bottom:6px;
    }

    .machine-name{
      font-size:27px;
      font-weight:800;
      line-height:1.1;
      letter-spacing:-0.5px;
      word-break:break-word;
    }

    }

    .field-label{
      display:block;
      font-size:14px;
      font-weight:700;
      color:rgba(255,255,255,0.86);
      margin-bottom:10px;
    }

      outline:none;
      border-radius:20px;
      padding:18px 16px;
      background:#f7f8fb;
      color:#0f172a;
      font-size:17px;
      line-height:1.45;
      box-shadow:inset 0 1px 2px rgba(0,0,0,0.05);

    textarea{
      min-height:150px;
      resize:none;
    }

    }

      align-items:center;
      margin-top:8px;
      font-size:13px;
      color:rgba(255,255,255,0.62);

      border-radius:20px;

      font-weight:800;
      cursor:pointer;

  let manutencoes = [];
  let unidadeSelecionada = "todas";

  async function carregar(){
    const { data, error } = await supabaseClient
      .from("manutencao_academia")
      .select("*")
      .order("data", { ascending:false });

    if(error){
      console.log("Erro ao carregar:", error);
      return;
    }

    manutencoes = data || [];
    render();
  }

  function obterDadosFiltrados(){
    const filtroTexto = document.getElementById("filtro").value.toLowerCase().trim();
    unidadeSelecionada = document.getElementById("filtroUnidade").value;

    return manutencoes.filter(item => {
      const id = String(item.maquina_id || "");
      const nome = maquinas[id] || "Máquina";
      const maquinaCompleta = `${nome} - ${id}`.toLowerCase();

      if (unidadeSelecionada === "centro" && !id.includes("centro-")) {
        return false;
      }

      if (unidadeSelecionada === "heliopolis" && id.includes("centro-")) {
        return false;
      }

      if (filtroTexto && !maquinaCompleta.includes(filtroTexto)) {
        return false;
      }

      return true;
    });
  }

  function calcularMetricas(dadosFiltrados){
    const total = dadosFiltrados.length;
    const abertos = dadosFiltrados.filter(item => String(item.status || "").trim().toLowerCase() === "aberto").length;
    const resolvidos = dadosFiltrados.filter(item => String(item.status || "").trim().toLowerCase() === "resolvido").length;

    document.getElementById("total").textContent = total;
    document.getElementById("abertos").textContent = abertos;
    document.getElementById("resolvidos").textContent = resolvidos;
    document.getElementById("contador").innerText = abertos;
  }

  function render(){
    const dadosFiltrados = obterDadosFiltrados();

    const listaAbertos = document.getElementById("listaAbertos");
    const listaResolvidos = document.getElementById("listaResolvidos");

    listaAbertos.innerHTML = "";
    listaResolvidos.innerHTML = "";

    let abertas = 0;
    let resolvidas = 0;

    dadosFiltrados.forEach(item => {
      const nome = maquinas[item.maquina_id] || "Máquina";
      const maquina = nome + " - " + item.maquina_id;

      const statusNormalizado = String(item.status || "").trim().toLowerCase();
      const estaResolvido = statusNormalizado === "resolvido";
      const estaAberto = !estaResolvido;

      const statusHtml = estaAberto
        ? `<span class="badge bg-danger">ABERTO</span>`
        : `<span class="badge bg-success">RESOLVIDO</span>`;

      const tipoProblemaHtml = item.tipo_problema
        ? `<div class="mt-2"><small><strong>Tipo:</strong> ${item.tipo_problema}</small></div>`
        : "";

      const dataResolucaoHtml = item.data_resolucao
        ? `<div class="mt-2"><small><strong>Resolvido em:</strong> ${new Date(item.data_resolucao).toLocaleString()}</small></div>`
        : "";

      const botoesHtml = estaAberto
        ? `
          <button class="btn btn-success botao" onclick="resolver('${item.id}')">Resolver</button>
          <button class="btn btn-danger botao" onclick="apagar('${item.id}')">Apagar</button>
        `
        : `
          <button class="btn btn-danger botao" onclick="apagar('${item.id}')">Apagar</button>
        `;

      const card = `
        <div class="card mb-3 shadow ${estaAberto ? "card-maquina" : "card-resolvido"}">
          <div class="card-body">
            <h5>${maquina}</h5>
            ${tipoProblemaHtml}
            <p class="mb-2 mt-2">${item.descricao || ""}</p>
            <small>${new Date(item.data).toLocaleString()}</small>
            <div class="status-texto">${statusHtml}</div>
            ${dataResolucaoHtml}
            <div class="mt-2">
              ${botoesHtml}
            </div>
          </div>
        </div>
      `;

      if(estaAberto){
        listaAbertos.innerHTML += card;
        abertas++;
      } else {
        listaResolvidos.innerHTML += card;
        resolvidas++;
      }
    });

    if(abertas === 0){
      listaAbertos.innerHTML = `<div class="vazio">Nenhuma manutenção em aberto.</div>`;
    }

    if(resolvidas === 0){
      listaResolvidos.innerHTML = `<div class="vazio">Nenhuma manutenção resolvida ainda.</div>`;
    }

    calcularMetricas(dadosFiltrados);
  }

  async function resolver(id){
    const senha = prompt("Digite a senha para resolver:");

    if(senha !== senhaResolver){
      alert("Senha incorreta");
      return;
    }

    const confirmar = confirm("Tem certeza que deseja marcar esta manutenção como resolvida?");
    if(!confirmar) return;

    const { data: dadosAtualizados, error } = await supabaseClient
      .from("manutencao_academia")
      .update({
        status: "resolvido",
        data_resolucao: new Date().toISOString()
      })
      .eq("id", id)
      .select();

    if(error){
      alert("Erro ao resolver manutenção: " + error.message);
      console.log(error);
      return;
    }

    console.log("Registro atualizado:", dadosAtualizados);

    manutencoes = manutencoes.map(item =>
      item.id === id
        ? { ...item, status: "resolvido", data_resolucao: new Date().toISOString() }
        : item
    );

    render();
    alert("Manutenção resolvida com sucesso");
    carregar();
  }

  async function apagar(id){
    const senha = prompt("Digite a senha para apagar:");

    if(senha !== senhaAdmin){
      alert("Senha incorreta");
      return;
    }

    const confirmar = confirm("Tem certeza que deseja apagar este registro?");
    if(!confirmar) return;

    const { error } = await supabaseClient
      .from("manutencao_academia")
      .delete()
      .eq("id", id);

    if(error){
      alert("Erro ao apagar registro: " + error.message);
      console.log(error);
    } else {
      alert("Registro apagado com sucesso");
      carregar();
    }
  }

  document.getElementById("filtro").addEventListener("input", render);
  document.getElementById("filtroUnidade").addEventListener("change", render);

  carregar();

  supabaseClient
    .channel("manutencao-realtime")
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "manutencao_academia"
      },
      payload => {
        console.log("Atualização recebida:", payload);
        carregar();
      }
    )
    .subscribe();
</script>

</body>
</html>
