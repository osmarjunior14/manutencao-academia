<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Registrar manutenção</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Registrar manutenção</h2>

<p id="maquina"></p>

<textarea id="descricao" maxlength="200"
placeholder="Descreva o problema"></textarea>

<br><br>

<button onclick="registrar()">Registrar</button>

<script>
  // CONEXÃO SUPABASE
  const supabaseUrl = "https://chyomxetiloktyepjbtk.supabase.co"
  const supabaseKey = "sb_publishable_ZuuKIqmGotY08ZepHonxHg_3IOjs6pI"
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

  // PEGAR ID DA MÁQUINA DA URL
  const params = new URLSearchParams(window.location.search)
  const maquinaId = params.get("id")

  const maquinaLabel = document.getElementById("maquina")

  if (maquinaId) {
    maquinaLabel.innerText = "Máquina ID: " + maquinaId
  } else {
    maquinaLabel.innerText = "⚠️ Nenhum ID de máquina foi informado na URL."
  }

  // FUNÇÃO REGISTRAR
  async function registrar(){

    if(!maquinaId){
      alert("Não é possível registrar sem ID da máquina.")
      return
    }

    let descricao = document.getElementById("descricao").value

    if(!descricao){
      alert("Descreva o problema")
      return
    }

    const { error } = await supabase
      .from("manutencao-academia")
      .insert([
        {
          maquina_id: maquinaId,
          descricao: descricao,
          data: new Date(),
          status: "aberto"
        }
      ])

    if(error){
      alert("Erro ao registrar manutenção")
      console.log(error)
    } else {
      alert("Manutenção registrada com sucesso")
      document.getElementById("descricao").value=""
    }
  }
</script>

</body>
</html>
