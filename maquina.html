<!DOCTYPE html>
<html>

<head>
<title>Registrar manutenção</title>
</head>

<body>

<h2>Registrar manutenção</h2>

<p id="maquina"></p>

<textarea id="descricao" maxlength="200"
placeholder="Descreva o problema"></textarea>

<br><br>

<button onclick="registrar()">Registrar</button>

<!-- biblioteca do Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- conexão com seu banco -->
<script src="supabase.js"></script>

<script>

const params = new URLSearchParams(window.location.search)
const maquinaId = params.get("id")

document.getElementById("maquina").innerText =
"Máquina ID: " + maquinaId

async function registrar(){

let descricao = document.getElementById("descricao").value

if(descricao.trim() === ""){
alert("Descreva o problema primeiro")
return
}

const { error } = await supabase
.from("manutencao-academia")
.insert([{
maquina_id: maquinaId,
descricao: descricao,
data: new Date(),
status: "aberto"
}])

if(error){
alert("Erro ao registrar manutenção")
console.log(error)
}else{
alert("Manutenção registrada com sucesso!")
document.getElementById("descricao").value=""
}

}

</script>

</body>
</html>
