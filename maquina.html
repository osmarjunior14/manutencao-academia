      margin:0;
      padding:0;
      -webkit-tap-highlight-color: transparent;

      justify-content:center;
      padding:20px 16px;
    }

    .wrapper{
      width:100%;
      max-width:460px;
    }

    .card{
      background:rgba(17, 28, 53, 0.92);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-radius:28px;
      padding:28px 20px 22px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.35),

    }

    .header{
      text-align:center;
      margin-bottom:22px;
    }

    .header .badge-top{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(34,197,94,0.14);
      color:#86efac;
      font-size:13px;
      font-weight:700;
      margin-bottom:14px;
      letter-spacing:0.2px;
    }

    .header h1{
      font-size:34px;
      line-height:1.05;
      font-weight:800;
      letter-spacing:-0.8px;
      margin-bottom:8px;
    }

    .header p{
      color:rgba(255,255,255,0.72);
      font-size:15px;
      line-height:1.45;
    }

    .machine-box{
      margin-top:6px;
      margin-bottom:18px;
      padding:16px 16px;
      border-radius:20px;
      background:linear-gradient(135deg, #27b8f5 0%, #1490e6 100%);
      box-shadow:0 14px 30px rgba(20,144,230,0.28);
    }

    .machine-label{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1px;
      font-weight:700;
      opacity:0.85;
      margin-bottom:6px;
    }

    .machine-name{
      font-size:27px;
      font-weight:800;
      line-height:1.1;
      letter-spacing:-0.5px;
      word-break:break-word;
    }

    .form-group{
      margin-top:14px;
    }

    .field-label{
      display:block;
      font-size:14px;
      font-weight:700;
      color:rgba(255,255,255,0.86);
      margin-bottom:10px;
    }

    .select-field,
    textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:20px;
      padding:18px 16px;
      background:#f7f8fb;
      color:#0f172a;
      font-size:17px;
      line-height:1.45;
      box-shadow:inset 0 1px 2px rgba(0,0,0,0.05);
    }

    textarea{
      min-height:150px;
      resize:none;
    }

    textarea::placeholder{
      color:#94a3b8;
    }

    .helper{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-top:8px;
      font-size:13px;
      color:rgba(255,255,255,0.62);
    }

    .button{
      width:100%;
      margin-top:18px;
      border:none;
      border-radius:20px;
      padding:18px 20px;
      background:linear-gradient(135deg, #31d66b 0%, #22c55e 100%);
      color:white;
      font-size:22px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 14px 30px rgba(34,197,94,0.28);
      transition:transform .12s ease, filter .12s ease;
    }

    .button:active{
      transform:scale(0.985);
      filter:brightness(0.98);
    }

    .button:disabled{
      opacity:0.7;
      cursor:not-allowed;
    }

    .message{
      display:none;
      margin-top:16px;
      padding:14px 16px;
      border-radius:16px;
      font-size:15px;
      font-weight:700;
      line-height:1.4;
    }

    .message.success{
      display:block;
      background:rgba(34,197,94,0.14);
      color:#86efac;
      border:1px solid rgba(34,197,94,0.25);
    }

    .message.error{
      display:block;
      background:rgba(239,68,68,0.14);
      color:#fca5a5;
      border:1px solid rgba(239,68,68,0.24);
    }

    .footer-note{
      text-align:center;
      margin-top:18px;
      color:rgba(255,255,255,0.45);
      font-size:12px;
      line-height:1.4;
    }

      .card{
        border-radius:24px;
        padding:24px 16px 20px;
      }

      .header h1{
        font-size:29px;
      }

      .machine-name{
        font-size:23px;
      }

      .button{
        font-size:20px;
      }
    }

</head>

    }

    if(!tipoProblema){
      mostrarMensagem("error", "Selecione o tipo de problema.");
      return;
    }

    if(tipoProblema === "outro" && !outroProblema){
      mostrarMensagem("error", "Descreva o problema na opção 'Outro'.");
      return;
    }

    botaoEl.disabled = true;
    botaoEl.textContent = "Enviando...";
    msgEl.className = "message";
    msgEl.textContent = "";

    const descricao = tipoProblema === "outro" ? outroProblema : "";
    const textoTelegram = tipoProblema === "outro"
      ? `Outro - ${outroProblema}`
      : (tipoProblemaMap[tipoProblema] || tipoProblema);

    try {
      const { error } = await supabaseClient
        .from("manutencao_academia")
        .insert([
          {
            maquina_id: maquinaId,
            tipo_problema: tipoProblema,
            descricao: descricao,
            data: new Date().toISOString(),
            status: "aberto"
          }
        ]);

      if(error){
        throw error;
      }

      try {
        await fetch("https://chyomxetiloktyepjbtk.supabase.co/functions/v1/super-function", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            maquina: nomeMaquina + " - " + maquinaId,
            descricao: textoTelegram,
            data: new Date().toLocaleString("pt-BR")
          })
        });
      } catch (erroTelegram) {
        console.log("Erro ao enviar notificação Telegram:", erroTelegram);
      }

      mostrarMensagem("success", "✅ Problema registrado com sucesso.");
      tipoProblemaEl.value = "";
      outroProblemaEl.value = "";
      document.getElementById("outroBox").style.display = "none";
      contadorEl.textContent = "0/200";

    } catch (error) {
      mostrarMensagem("error", "Erro ao registrar manutenção. Tente novamente.");
      console.log("Erro ao registrar:", error);
    } finally {
      botaoEl.disabled = false;
      botaoEl.textContent = "Registrar";
    }
  }
</script>

</body>
</html>
