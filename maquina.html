<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registrar manutenção</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  min-height:100vh;
  font-family:Arial, sans-serif;
  background:#0b1838;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:100%;
  max-width:400px;
  background:#111c35;
  padding:20px;
  border-radius:20px;
}

.select-field, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

.button{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

.message{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>Registrar manutenção</h2>

<div id="maquina"></div>

<select id="tipoProblema" class="select-field" onchange="alternarOutro()">
  <option value="">Selecione o problema</option>
  <option value="barulho_anormal">Barulho anormal</option>
  <option value="cabo_rompido">Cabo rompido</option>
  <option value="choque_eletrico">Choque elétrico</option>
  <option value="corrente_ou_correia_com_defeito">Corrente/correia com defeito</option>
  <option value="equipamento_travando">Equipamento travando</option>
  <option value="estrutura_solta">Estrutura solta</option>
  <option value="estofado_rasgado">Estofado rasgado</option>
  <option value="lubrificacao_necessaria">Lubrificação necessária</option>
  <option value="painel_ou_display_com_defeito">Painel/display com defeito</option>
  <option value="parafuso_frouxo">Parafuso frouxo</option>
  <option value="pino_de_ajuste_quebrado">Pino de ajuste quebrado</option>
  <option value="polia_com_defeito">Polia com defeito</option>
  <option value="regulagem_com_defeito">Regulagem com defeito</option>
  <option value="sem_carga_ou_resistencia">Sem carga ou resistência</option>
  <option value="outro">Outro</option>
</select>

<div id="outroBox" style="display:none;">
  <textarea id="outroProblema" placeholder="Descreva o problema"></textarea>
</div>

<button class="button" onclick="registrar()">Registrar</button>

<div id="msg" class="message"></div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://chyomxetiloktyepjbtk.supabase.co",
  "sb_publishable_ZuuKIqmGotY08ZepHonxHg_3IOjs6pI"
);

const params = new URLSearchParams(window.location.search);
const maquinaId = params.get("id");

document.getElementById("maquina").innerText = "Máquina: " + maquinaId;

function alternarOutro(){
  const tipo = document.getElementById("tipoProblema").value;
  document.getElementById("outroBox").style.display =
    tipo === "outro" ? "block" : "none";
}

async function registrar(){

  const tipoProblema = document.getElementById("tipoProblema").value;
  const outroProblema = document.getElementById("outroProblema").value.trim();

  if(!tipoProblema){
    alert("Selecione o problema");
    return;
  }

  const descricao = tipoProblema === "outro" ? outroProblema : "";

  const { error } = await supabase
    .from("manutencao_academia")
    .insert([
      {
        maquina_id: maquinaId,
        tipo_problema: tipoProblema,
        descricao: descricao,
        data: new Date().toISOString(),
        status: "aberto"
      }
    ]);

  if(error){
    alert("Erro ao registrar");
    console.log(error);
    return;
  }

  // TELEGRAM
  await fetch("https://chyomxetiloktyepjbtk.supabase.co/functions/v1/super-function", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      maquina: maquinaId,
      descricao: tipoProblema === "outro" ? outroProblema : tipoProblema,
      data: new Date().toLocaleString("pt-BR")
    })
  });

  alert("Registrado com sucesso");
}
</script>

</body>
</html>
