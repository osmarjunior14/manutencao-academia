<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registrar manutenção</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      min-height:100vh;
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, #163a74 0%, #0b1838 45%, #071126 100%);
      color:#ffffff;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px 16px;
    }

    .wrapper{
      width:100%;
      max-width:460px;
    }

    .card{
      background:rgba(17, 28, 53, 0.92);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(14px);
      border-radius:28px;
      padding:28px 20px 22px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .header{
      text-align:center;
      margin-bottom:22px;
    }

    .header .badge-top{
      display:inline-flex;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(34,197,94,0.14);
      color:#86efac;
      font-size:13px;
      font-weight:700;
      margin-bottom:14px;
    }

    .header h1{
      font-size:32px;
      font-weight:800;
      margin-bottom:8px;
    }

    .header p{
      color:rgba(255,255,255,0.72);
      font-size:14px;
    }

    .machine-box{
      margin-bottom:18px;
      padding:16px;
      border-radius:20px;
      background:linear-gradient(135deg, #27b8f5 0%, #1490e6 100%);
    }

    .machine-name{
      font-size:24px;
      font-weight:800;
    }

    textarea{
      width:100%;
      min-height:140px;
      border:none;
      border-radius:16px;
      padding:16px;
      font-size:16px;
      margin-top:12px;
      color:#000;
    }

    .button{
      width:100%;
      margin-top:16px;
      border:none;
      border-radius:16px;
      padding:16px;
      background:#22c55e;
      color:white;
      font-size:20px;
      font-weight:800;
      cursor:pointer;
    }

    .message{
      display:none;
      margin-top:14px;
      padding:12px;
      border-radius:12px;
      font-weight:700;
    }

    .success{
      display:block;
      background:#14532d;
      color:#86efac;
    }

    .error{
      display:block;
      background:#7f1d1d;
      color:#fca5a5;
    }
  </style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="header">
      <div class="badge-top">DUO Academia</div>
      <h1>Registrar problema</h1>
      <p>Descreva o problema encontrado</p>
    </div>

    <div class="machine-box">
      <div class="machine-name" id="maquina"></div>
    </div>

    <textarea id="descricao" maxlength="200"
      placeholder="Ex: cabo rompido, banco solto..."></textarea>

    <button class="button" onclick="registrar()" id="btn">
      Registrar problema
    </button>

    <div id="msg" class="message"></div>

  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://chyomxetiloktyepjbtk.supabase.co",
  "sb_publishable_ZuuKIqmGotY08ZepHonxHg_3IOjs6pI"
);

const params = new URLSearchParams(window.location.search);
const maquinaId = params.get("id");

const maquinas = {
  "21":"LEG PRESS 45º",
  "23":"LEG PRESS 180º",
  "3":"APOLETE"
  // pode deixar completo depois
};

const nomeMaquina = maquinas[maquinaId] || "Máquina";
document.getElementById("maquina").innerText = nomeMaquina + " - " + maquinaId;

function msg(tipo, texto){
  const el = document.getElementById("msg");
  el.className = "message " + tipo;
  el.innerText = texto;
}

async function registrar(){

  const descricao = document.getElementById("descricao").value.trim();

  if(!descricao){
    msg("error", "Digite uma descrição");
    return;
  }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.innerText = "Enviando...";

  try {

    const { error } = await supabase
      .from("manutencao_academia")
      .insert([{
        maquina_id: maquinaId,
        descricao: descricao,
        data: new Date().toISOString(),
        status: "aberto"
      }]);

    if(error) throw error;

    // 🔔 TELEGRAM
    await fetch("https://chyomxetiloktyepjbtk.supabase.co/functions/v1/super-function", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        maquina: nomeMaquina + " - " + maquinaId,
        descricao: descricao,
        data: new Date().toLocaleString("pt-BR")
      })
    });

    msg("success", "Registrado com sucesso!");
    document.getElementById("descricao").value = "";

  } catch(e){
    console.log(e);
    msg("error", "Erro ao enviar");
  }

  btn.disabled = false;
  btn.innerText = "Registrar problema";
}
</script>

</body>
</html>
