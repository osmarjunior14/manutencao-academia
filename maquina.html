<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registrar Problema</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial;
      background:#f5f7fb;
      padding:20px;
      text-align:center;
    }

    .card{
      max-width:500px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    h2{
      margin-bottom:10px;
    }

    select, textarea, button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ddd;
      font-size:16px;
    }

    button{
      background:#2563eb;
      color:#fff;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    .ok{
      color:green;
      margin-top:10px;
    }
  </style>
</head>
<body>

<div class="card">

  <h2 id="tituloMaquina">Carregando...</h2>

  <p>Selecione o problema encontrado:</p>

  <select id="problema">
    <option value="">Selecione</option>
    <option value="barulho_anormal">Barulho anormal</option>
    <option value="cabo_rompido">Cabo rompido</option>
    <option value="choque_eletrico">Choque elétrico</option>
    <option value="corrente_ou_correia_com_defeito">Corrente/correia com defeito</option>
    <option value="equipamento_travando">Equipamento travando</option>
    <option value="estrutura_solta">Estrutura solta</option>
    <option value="estofado_rasgado">Estofado rasgado</option>
    <option value="lubrificacao_necessaria">Lubrificação necessária</option>
    <option value="painel_ou_display_com_defeito">Painel/display com defeito</option>
    <option value="parafuso_frouxo">Parafuso frouxo</option>
    <option value="pino_de_ajuste_quebrado">Pino de ajuste quebrado</option>
    <option value="polia_com_defeito">Polia com defeito</option>
    <option value="regulagem_com_defeito">Regulagem com defeito</option>
    <option value="sem_adesivo_de_pesos">Sem adesivo de pesos</option>
    <option value="sem_carga_ou_resistencia">Sem carga ou resistência</option>
    <option value="sem_estofado">Sem estofado</option>
    <option value="outro">Outro</option>
  </select>

  <textarea id="descricao" placeholder="Descreva o problema..." style="display:none;"></textarea>

  <button onclick="enviar()">Registrar problema</button>

  <p id="msg" class="ok"></p>

</div>

<script>
  const supabaseUrl = "https://chyomxetiloktyepjbtk.supabase.co";
  const supabaseKey = "sb_publishable_ZuuKIqmGotY08ZepHonxHg_3IOjs6pI";
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  const params = new URLSearchParams(window.location.search);
  const maquinaId = params.get("id");

  document.getElementById("tituloMaquina").innerText = "Máquina ID: " + maquinaId;

  document.getElementById("problema").addEventListener("change", function(){
    if(this.value === "outro"){
      document.getElementById("descricao").style.display = "block";
    } else {
      document.getElementById("descricao").style.display = "none";
    }
  });

  async function enviar(){
    const tipo = document.getElementById("problema").value;
    const descricao = document.getElementById("descricao").value;

    if(!tipo){
      alert("Selecione o problema");
      return;
    }

    const { error } = await supabase
      .from("manutencao_academia")
      .insert([
        {
          maquina_id: maquinaId,
          tipo_problema: tipo,
          descricao: tipo === "outro" ? descricao : "",
          status: "aberto",
          data: new Date().toISOString()
        }
      ]);

    if(error){
      alert("Erro ao registrar: " + error.message);
      return;
    }

    document.getElementById("msg").innerText = "Problema registrado com sucesso!";
  }
</script>

</body>
</html>
