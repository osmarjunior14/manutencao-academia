<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maquinários - DUO</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
      padding:20px;
      margin:0;
    }

    h1{
      margin-bottom:20px;
    }

    h2{
      margin-top:26px;
      margin-bottom:10px;
    }

    .bloco{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .linha{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid #334155;
    }

    .linha:last-child{
      border-bottom:none;
    }

    .info{
      flex:1;
      word-break:break-word;
    }

    .maquina-click{
      cursor:pointer;
      font-weight:bold;
      text-decoration:underline;
      text-underline-offset:3px;
    }

    .status-maquina{
      margin-top:6px;
      font-size:13px;
      font-weight:bold;
    }

    .status-maquina.ok{
      color:#86efac;
    }

    .status-maquina.alerta{
      color:#fca5a5;
    }

    .acoes{
      display:flex;
      gap:8px;
      flex-shrink:0;
      flex-wrap:wrap;
    }

    button{
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-add{
      margin-bottom:10px;
      background:#22c55e;
      color:white;
    }

    .btn-geral{
      margin-bottom:10px;
      background:#3b82f6;
      color:white;
      margin-left:10px;
    }

    .btn-qr{
      background:#3b82f6;
      color:white;
    }

    .btn-editar{
      background:#f59e0b;
      color:white;
    }

    .btn-apagar{
      background:#ef4444;
      color:white;
    }

    .form{
      margin-top:10px;
      margin-bottom:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      background:#1e293b;
      padding:16px;
      border-radius:12px;
    }

    .barra-topo{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:18px;
    }

    .barra-topo input,
    .barra-topo select,
    .form input,
    .form select{
      padding:10px;
      border-radius:6px;
      border:none;
      min-width:180px;
    }

    .vazio{
      color:#94a3b8;
      font-style:italic;
    }

    .modal-overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.65);
      z-index:9999;
      padding:20px;
      align-items:center;
      justify-content:center;
    }

    .modal{
      width:100%;
      max-width:760px;
      max-height:85vh;
      overflow:auto;
      background:#111827;
      border-radius:14px;
      padding:20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.35);
    }

    .modal-topo{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:18px;
    }

    .modal-topo h3{
      margin:0;
      font-size:24px;
    }

    .modal-topo p{
      margin:6px 0 0 0;
      color:#94a3b8;
      font-size:14px;
    }

    .btn-fechar{
      background:#374151;
      color:white;
      flex-shrink:0;
    }

    .historico-card{
      background:#1f2937;
      border:1px solid #374151;
      border-radius:12px;
      padding:14px;
      margin-bottom:12px;
    }

    .historico-linha-topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .historico-tipo{
      font-weight:bold;
      font-size:15px;
    }

    .badge-status{
      font-size:12px;
      font-weight:bold;
      padding:5px 10px;
      border-radius:999px;
      display:inline-block;
    }

    .badge-aberto{
      background:#7f1d1d;
      color:#fecaca;
    }

    .badge-resolvido{
      background:#14532d;
      color:#bbf7d0;
    }

    .historico-desc{
      color:#e5e7eb;
      margin:8px 0;
      white-space:pre-wrap;
    }

    .historico-meta{
      color:#9ca3af;
      font-size:13px;
      line-height:1.5;
    }

    @media (max-width: 700px){
      .linha{
        flex-direction:column;
        align-items:flex-start;
      }

      .acoes{
        width:100%;
      }

      .acoes button{
        flex:1;
      }

      .btn-geral{
        margin-left:0;
      }

      .modal{
        padding:16px;
      }
    }
  </style>
</head>
<body>

<h1>📋 Maquinários</h1>

<button class="btn-add" onclick="abrirForm()">+ Adicionar Maquinário</button>
<button class="btn-geral" onclick="gerarTodosQRCodes()">Todos os QR Codes</button>
<button class="btn-geral" onclick="gerarTodosQRCodes('DUO HELIÓPOLIS')">QR Codes - Heliópolis</button>
<button class="btn-geral" onclick="gerarTodosQRCodes('DUO CENTRO')">QR Codes - Centro</button>

<div class="barra-topo">
  <input id="busca" placeholder="Buscar por nome ou ID..." oninput="carregar()">

  <select id="ordenacao" onchange="carregar()">
    <option value="nome_asc">Classificar por: Nome A → Z</option>
    <option value="nome_desc">Classificar por: Nome Z → A</option>
    <option value="id_asc">Classificar por: ID do maquinário</option>
  </select>
</div>

<div class="form" id="form" style="display:none;">
  <select id="unidade">
    <option value="DUO HELIÓPOLIS">DUO HELIÓPOLIS</option>
    <option value="DUO CENTRO">DUO CENTRO</option>
  </select>

  <input id="id" placeholder="ID (ex: 101 ou centro-74)">
  <input id="nome" placeholder="Nome da máquina">

  <button class="btn-add" onclick="salvar()">Salvar</button>
</div>

<h2>🏋️ DUO HELIÓPOLIS</h2>
<div id="heliopolis" class="bloco"></div>

<h2>🏋️ DUO CENTRO</h2>
<div id="centro" class="bloco"></div>

<div id="modalHistoricoOverlay" class="modal-overlay">
  <div class="modal">
    <div class="modal-topo">
      <div>
        <h3 id="tituloHistorico">Histórico da máquina</h3>
        <p>Clique fora ou no botão para fechar.</p>
      </div>
      <button class="btn-fechar" onclick="fecharHistorico()">Fechar</button>
    </div>

    <div id="conteudoHistorico"></div>
  </div>
</div>

<script>
  const supabaseClient = window.supabase.createClient(
    "https://chyomxetiloktyepjbtk.supabase.co",
    "sb_publishable_ZuuKIqmGotY08ZepHonxHg_3IOjs6pI"
  );

  const senhaAdmin = "7c9446a1";

  const tipoProblemaMap = {
    "barulho_anormal":"Barulho anormal",
    "cabo_rompido":"Cabo rompido",
    "choque_eletrico":"Choque elétrico",
    "corrente_ou_correia_com_defeito":"Corrente/correia com defeito",
    "equipamento_travando":"Equipamento travando",
    "estrutura_solta":"Estrutura solta",
    "estofado_rasgado":"Estofado rasgado",
    "fita_antiderrapante_desgastada":"Fita Antiderrapante Desgastada",
    "higienização_necessária":"Higienização necessária",
    "lubrificacao_necessaria":"Lubrificação necessária",
    "painel_ou_display_com_defeito":"Painel/display com defeito",
    "parafuso_frouxo":"Parafuso frouxo",
    "pino_de_ajuste_quebrado":"Pino de ajuste quebrado",
    "polia_com_defeito":"Polia com defeito",
    "regulagem_com_defeito":"Regulagem com defeito",
    "sem_adesivo_de_pesos":"Sem adesivo de pesos",
    "sem_carga_ou_resistencia":"Sem carga ou resistência",
    "sem_estofado":"Sem estofado",
    "outro":"Outro"
  };

  function formatarTipoProblema(valor){
    return tipoProblemaMap[valor] || valor || "Problema";
  }

  function formatarDataHora(dataIso){
    if(!dataIso) return "-";
    try{
      return new Date(dataIso).toLocaleString("pt-BR", {
        timeZone: "America/Sao_Paulo"
      });
    } catch {
      return dataIso;
    }
  }

  function abrirForm(){
    const form = document.getElementById("form");
    form.style.display = form.style.display === "none" ? "flex" : "none";
  }

  async function salvar(){
    const unidade = document.getElementById("unidade").value;
    const id = document.getElementById("id").value.trim();
    const nome = document.getElementById("nome").value.trim();

    if(!id || !nome){
      alert("Preencha tudo");
      return;
    }

    const { error } = await supabaseClient
      .from("maquinarios")
      .insert([{ unidade, maquina_id: id, nome }]);

    if(error){
      console.log("Erro ao salvar:", error);
      alert("Erro ao salvar maquinário");
      return;
    }

    document.getElementById("id").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("form").style.display = "none";

    carregar();
  }

  function gerarQR(id){
    const url = `${location.origin}/manutencao-academia/maquina.html?id=${encodeURIComponent(id)}`;
    window.open(
      `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`,
      "_blank"
    );
  }

  function ordenarLista(lista){
    const criterio = document.getElementById("ordenacao").value;

    if(criterio === "nome_asc"){
      return lista.sort((a, b) => String(a.nome || "").localeCompare(String(b.nome || ""), "pt-BR"));
    }

    if(criterio === "nome_desc"){
      return lista.sort((a, b) => String(b.nome || "").localeCompare(String(a.nome || ""), "pt-BR"));
    }

    if(criterio === "id_asc"){
      return lista.sort((a, b) => String(a.maquina_id || "").localeCompare(String(b.maquina_id || ""), "pt-BR", { numeric: true }));
    }

    return lista;
  }

  function filtrarLista(lista){
    const busca = document.getElementById("busca").value.trim().toLowerCase();

    if(!busca) return lista;

    return lista.filter(item => {
      const nome = String(item.nome || "").toLowerCase();
      const id = String(item.maquina_id || "").toLowerCase();
      return nome.includes(busca) || id.includes(busca);
    });
  }

  async function editarMaquinario(maquinaId){
    const senha = prompt("Digite a senha para editar o maquinário:");
    if(senha !== senhaAdmin){
      alert("Senha incorreta");
      return;
    }

    const { data, error } = await supabaseClient
      .from("maquinarios")
      .select("*")
      .eq("maquina_id", maquinaId)
      .single();

    if(error || !data){
      console.log("Erro ao buscar maquinário:", error);
      alert("Não foi possível localizar esse maquinário.");
      return;
    }

    const novoNome = prompt("Digite o novo nome da máquina:", data.nome || "");
    if(novoNome === null) return;

    const novoId = prompt("Digite o novo ID da máquina:", data.maquina_id || "");
    if(novoId === null) return;

    const novaUnidade = prompt("Digite a unidade (DUO HELIÓPOLIS ou DUO CENTRO):", data.unidade || "");
    if(novaUnidade === null) return;

    const nomeFinal = novoNome.trim();
    const idFinal = novoId.trim();
    const unidadeFinal = novaUnidade.trim();

    if(!nomeFinal || !idFinal || !unidadeFinal){
      alert("Nenhum campo pode ficar vazio.");
      return;
    }

    const { error: updateError } = await supabaseClient
      .from("maquinarios")
      .update({
        nome: nomeFinal,
        maquina_id: idFinal,
        unidade: unidadeFinal
      })
      .eq("id", data.id);

    if(updateError){
      console.log("Erro ao editar maquinário:", updateError);
      alert("Erro ao editar maquinário.");
      return;
    }

    alert("Maquinário editado com sucesso.");
    carregar();
  }

  async function apagarMaquinario(maquinaId){
    const senha = prompt("Digite a senha para apagar o maquinário:");
    if(senha !== senhaAdmin){
      alert("Senha incorreta");
      return;
    }

    const confirmar = confirm(`Tem certeza que deseja apagar o maquinário ${maquinaId}?`);
    if(!confirmar) return;

    const { error } = await supabaseClient
      .from("maquinarios")
      .delete()
      .eq("maquina_id", maquinaId);

    if(error){
      console.log("Erro ao apagar maquinário:", error);
      alert("Erro ao apagar maquinário.");
      return;
    }

    alert("Maquinário apagado com sucesso.");
    carregar();
  }

  async function abrirHistorico(maquinaId, nomeMaquina){
    const overlay = document.getElementById("modalHistoricoOverlay");
    const titulo = document.getElementById("tituloHistorico");
    const conteudo = document.getElementById("conteudoHistorico");

    titulo.textContent = `${maquinaId} - ${nomeMaquina}`;
    conteudo.innerHTML = `<div class="vazio">Carregando histórico...</div>`;
    overlay.style.display = "flex";

    const { data, error } = await supabaseClient
      .from("manutencao_academia")
      .select("*")
      .eq("maquina_id", maquinaId)
      .order("data", { ascending: false });

    if(error){
      console.log("Erro ao buscar histórico:", error);
      conteudo.innerHTML = `<div class="vazio">Erro ao carregar histórico.</div>`;
      return;
    }

    if(!data || data.length === 0){
      conteudo.innerHTML = `<div class="vazio">Nenhum histórico encontrado para essa máquina.</div>`;
      return;
    }

    conteudo.innerHTML = data.map(item => {
      const status = String(item.status || "").toLowerCase() === "resolvido"
        ? `<span class="badge-status badge-resolvido">RESOLVIDO</span>`
        : `<span class="badge-status badge-aberto">ABERTO</span>`;

      const descricao = item.descricao
        ? `<div class="historico-desc">${item.descricao}</div>`
        : "";

      const resolvidoEm = item.data_resolucao
        ? `<div><strong>Resolvido em:</strong> ${formatarDataHora(item.data_resolucao)}</div>`
        : "";

      return `
        <div class="historico-card">
          <div class="historico-linha-topo">
            <div class="historico-tipo">${formatarTipoProblema(item.tipo_problema)}</div>
            <div>${status}</div>
          </div>

          ${descricao}

          <div class="historico-meta">
            <div><strong>Registrado em:</strong> ${formatarDataHora(item.data)}</div>
            ${resolvidoEm}
          </div>
        </div>
      `;
    }).join("");
  }

  function fecharHistorico(){
    document.getElementById("modalHistoricoOverlay").style.display = "none";
    document.getElementById("conteudoHistorico").innerHTML = "";
  }

  document.getElementById("modalHistoricoOverlay").addEventListener("click", function(e){
    if(e.target.id === "modalHistoricoOverlay"){
      fecharHistorico();
    }
  });

  async function carregar(){
    const [maquinariosResp, manutencoesResp] = await Promise.all([
      supabaseClient
        .from("maquinarios")
        .select("*"),
      supabaseClient
        .from("manutencao_academia")
        .select("maquina_id")
        .eq("status", "aberto")
    ]);

    if(maquinariosResp.error){
      console.log("ERRO SUPABASE maquinarios:", maquinariosResp.error);
      alert("Erro ao carregar maquinários");
      return;
    }

    if(manutencoesResp.error){
      console.log("ERRO SUPABASE manutencoes:", manutencoesResp.error);
      alert("Erro ao carregar problemas em aberto");
      return;
    }

    let data = maquinariosResp.data || [];
    const problemas = manutencoesResp.data || [];

    data = filtrarLista(data);
    data = ordenarLista(data);

    const contagemAbertos = {};

    problemas.forEach(item => {
      const id = item.maquina_id;
      contagemAbertos[id] = (contagemAbertos[id] || 0) + 1;
    });

    const helio = document.getElementById("heliopolis");
    const centro = document.getElementById("centro");

    helio.innerHTML = "";
    centro.innerHTML = "";

    const heliopolis = data.filter(m => m.unidade === "DUO HELIÓPOLIS");
    const duoCentro = data.filter(m => m.unidade === "DUO CENTRO");

    if(heliopolis.length === 0){
      helio.innerHTML = `<div class="vazio">Nenhum maquinário encontrado.</div>`;
    } else {
      heliopolis.forEach(m => {
        const quantidadeAbertos = contagemAbertos[m.maquina_id] || 0;
        const statusHtml = quantidadeAbertos > 0
          ? `<div class="status-maquina alerta">🔴 ${quantidadeAbertos} em aberto</div>`
          : `<div class="status-maquina ok">🟢 OK</div>`;

        const maquinaIdSeguro = String(m.maquina_id).replace(/'/g, "\\'");
        const nomeSeguro = String(m.nome).replace(/'/g, "\\'");

        const div = document.createElement("div");
        div.className = "linha";

        div.innerHTML = `
          <div class="info">
            <div class="maquina-click" onclick="abrirHistorico('${maquinaIdSeguro}', '${nomeSeguro}')">${m.maquina_id} - ${m.nome}</div>
            ${statusHtml}
          </div>
          <div class="acoes">
            <button class="btn-qr" onclick="gerarQR('${maquinaIdSeguro}')">QR</button>
            <button class="btn-editar" onclick="editarMaquinario('${maquinaIdSeguro}')">Editar</button>
            <button class="btn-apagar" onclick="apagarMaquinario('${maquinaIdSeguro}')">Apagar</button>
          </div>
        `;

        helio.appendChild(div);
      });
    }

    if(duoCentro.length === 0){
      centro.innerHTML = `<div class="vazio">Nenhum maquinário encontrado.</div>`;
    } else {
      duoCentro.forEach(m => {
        const quantidadeAbertos = contagemAbertos[m.maquina_id] || 0;
        const statusHtml = quantidadeAbertos > 0
          ? `<div class="status-maquina alerta">🔴 ${quantidadeAbertos} em aberto</div>`
          : `<div class="status-maquina ok">🟢 OK</div>`;

        const maquinaIdSeguro = String(m.maquina_id).replace(/'/g, "\\'");
        const nomeSeguro = String(m.nome).replace(/'/g, "\\'");

        const div = document.createElement("div");
        div.className = "linha";

        div.innerHTML = `
          <div class="info">
            <div class="maquina-click" onclick="abrirHistorico('${maquinaIdSeguro}', '${nomeSeguro}')">${m.maquina_id} - ${m.nome}</div>
            ${statusHtml}
          </div>
          <div class="acoes">
            <button class="btn-qr" onclick="gerarQR('${maquinaIdSeguro}')">QR</button>
            <button class="btn-editar" onclick="editarMaquinario('${maquinaIdSeguro}')">Editar</button>
            <button class="btn-apagar" onclick="apagarMaquinario('${maquinaIdSeguro}')">Apagar</button>
          </div>
        `;

        centro.appendChild(div);
      });
    }
  }

  function dividirEmGrupos(lista, tamanho){
    const grupos = [];
    for(let i = 0; i < lista.length; i += tamanho){
      grupos.push(lista.slice(i, i + tamanho));
    }
    return grupos;
  }

  async function gerarTodosQRCodes(unidadeFiltro = null){
    let query = supabaseClient
      .from("maquinarios")
      .select("*")
      .order("unidade")
      .order("nome");

    if(unidadeFiltro){
      query = query.eq("unidade", unidadeFiltro);
    }

    const { data, error } = await query;

    if(error){
      alert("Erro ao carregar maquinários para gerar os QR Codes.");
      console.log(error);
      return;
    }

    if(!data || data.length === 0){
      alert("Nenhum maquinário encontrado para essa unidade.");
      return;
    }

    const grupos = dividirEmGrupos(data, 4);
    const tituloPagina = unidadeFiltro ? `QR Codes - ${unidadeFiltro}` : "Todos os QR Codes";
    const nomeArquivo = unidadeFiltro
      ? `qrcodes-${unidadeFiltro.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "-")}.pdf`
      : "qrcodes-maquinarios.pdf";

    let html = `
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${tituloPagina}</title>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"><\/script>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      padding:24px;
      background:#e9e9e9;
      font-family:Arial, sans-serif;
    }

    .topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:24px;
      flex-wrap:wrap;
    }

    .topo h1{
      margin:0;
      font-size:28px;
      color:#111827;
    }

    .topo-botoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .topo button{
      padding:12px 18px;
      border:none;
      border-radius:10px;
      color:#fff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }

    .btn-imprimir{
      background:#2563eb;
    }

    .btn-pdf{
      background:#16a34a;
    }

    .todas-folhas{
      display:flex;
      flex-direction:column;
      gap:24px;
      align-items:center;
    }

    .folha{
      width:19cm;
      min-height:27.7cm;
      background:#ffffff;
      padding:1cm;
      display:grid;
      grid-template-columns:repeat(2, 7cm);
      grid-template-rows:repeat(2, 10cm);
      gap:0.8cm 1cm;
      justify-content:center;
      align-content:start;
      box-shadow:0 8px 24px rgba(0,0,0,0.10);
    }

    .etiqueta{
      width:7cm;
      height:10cm;
      background:linear-gradient(180deg, #020817 0%, #010b1f 100%);
      border-radius:18px;
      padding:0.35cm;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      overflow:hidden;
    }

    .topo-etiqueta{
      width:100%;
      background:linear-gradient(90deg, #03143d 0%, #132b63 100%);
      border-radius:10px;
      padding:0.18cm 0.22cm;
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:0.28cm;
    }

    .id-label{
      color:#1fb6ff;
      font-weight:900;
      font-size:12px;
      letter-spacing:0.3px;
    }

    .id-valor{
      color:#ffffff;
      font-weight:900;
      font-size:24px;
      line-height:1;
      text-align:right;
    }

      width:100%;
      height:1.2cm;
      margin-bottom:0.18cm;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#ffffff;
      font-weight:800;
      line-height:1.1;
      font-size:15px;
      overflow:hidden;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:2;
      word-break:break-word;
      hyphens:auto;
    }

    .qr-box{
      width:100%;
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:0.22cm;

    .qr{
      width:4.8cm;
      height:4.8cm;
      background:#ffffff;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0.18cm;
      overflow:hidden;
    }

    .qr img,
    .qr canvas{
      display:block;
      max-width:100%;
      max-height:100%;
    }

    .rodape{
      margin-top:auto;
      width:100%;
      border-top:1px solid rgba(59,130,246,0.22);
      padding-top:0.18cm;
      text-align:left;
      color:#94a3af;
      font-size:11px;
    }

    @media print{
      @page{
        size:A4 portrait;
        margin:0;
      }

      body{
        background:#ffffff;
        padding:0;
      }

      .topo{
        display:none;
      }

      .todas-folhas{
        gap:0;
      }

      .folha{
        width:19cm;
        min-height:27.7cm;
        box-shadow:none;
        margin:0;

        break-after:page;

      .folha:last-child{
        page-break-after:auto;

      }
    }
  </style>
</head>
<body>
  <div class="topo">
    <h1>${tituloPagina}</h1>

    <div class="topo-botoes">
      <button class="btn-pdf" onclick="baixarPDF()">Baixar PDF</button>
      <button class="btn-imprimir" onclick="window.print()">Imprimir</button>
    </div>
  </div>

  <div class="todas-folhas" id="todasFolhas">
`;

    grupos.forEach(grupo => {
      html += `<div class="folha">`;

      grupo.forEach(m => {
        const url = `${location.origin}/manutencao-academia/maquina.html?id=${encodeURIComponent(m.maquina_id)}`;

        html += `
    <div class="etiqueta">
      <div class="topo-etiqueta">
        <div class="id-label">ID</div>
        <div class="id-valor">${String(m.maquina_id || "").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
      </div>

      <div class="nome-maquina">${String(m.nome || "").replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>

      <div class="qr-box">
        <div class="qr" data-url="${url}"></div>
      </div>

      <div class="rodape">Escaneie para reportar problemas</div>
    </div>
`;
      });

      const faltando = 4 - grupo.length;
      for(let i = 0; i < faltando; i++){
        html += `<div style="width:7cm;height:10cm;"></div>`;
      }

      html += `</div>`;
    });

    html += `
  </div>

  <script>
    function gerarQRs(){
      const elementos = document.querySelectorAll(".qr");

      elementos.forEach(el => {
        const url = el.getAttribute("data-url");
        new QRCode(el, {
          text: url,
          width: 170,
          height: 170
        });
      });
    }

    function ajustarNomes(){
      const nomes = document.querySelectorAll(".nome-maquina");

      nomes.forEach(el => {
        let tamanho = 15;
        el.style.fontSize = tamanho + "px";

        while (
          tamanho > 9 &&
          (el.scrollHeight > el.clientHeight || el.scrollWidth > el.clientWidth)
        ) {
          tamanho--;
          el.style.fontSize = tamanho + "px";
        }
      });
    }

    async function baixarPDF(){
      const botao = document.querySelector(".btn-pdf");
      const folhas = Array.from(document.querySelectorAll(".folha"));

      try{
        botao.disabled = true;
        botao.textContent = "Gerando PDF...";

        await new Promise(resolve => setTimeout(resolve, 700));

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF("p", "mm", "a4");

        for(let i = 0; i < folhas.length; i++){
          const folha = folhas[i];

          const canvas = await html2canvas(folha, {
            scale: 2,
            backgroundColor: "#ffffff",
            logging: false
          });

          const imgData = canvas.toDataURL("image/png");
          const pdfWidth = 210;
          const pdfHeight = 297;

          if(i > 0){
            pdf.addPage();
          }

          pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
        }

        pdf.save("${nomeArquivo}");
      } catch(erro){
        console.log("Erro ao gerar PDF:", erro);
        alert("Não foi possível gerar o PDF.");
      } finally {
        botao.disabled = false;
        botao.textContent = "Baixar PDF";
      }
    }

    gerarQRs();
    ajustarNomes();
  <\/script>
</body>
</html>
`;

    const novaJanela = window.open("", "_blank");

    if(!novaJanela){
      alert("O navegador bloqueou a nova janela. Libere pop-ups para este site.");
      return;
    }

    novaJanela.document.open();
    novaJanela.document.write(html);
    novaJanela.document.close();
  }

  carregar();
</script>

</body>
</html>
