<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maquinários - DUO</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
      padding:20px;
      margin:0;
    }

    h1{
      margin-bottom:20px;
    }

    h2{
      margin-top:26px;
      margin-bottom:10px;
    }

    .bloco{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .linha{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:10px 0;
      border-bottom:1px solid #334155;
    }

    .linha:last-child{
      border-bottom:none;
    }

    .info{
      flex:1;
      word-break:break-word;
    }

    .acoes{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    button{
      padding:8px 12px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .btn-add{
      margin-bottom:10px;
      background:#22c55e;
      color:white;
    }

    .btn-geral{
      margin-bottom:10px;
      background:#3b82f6;
      color:white;
      margin-left:10px;
    }

    .btn-qr{
      background:#3b82f6;
      color:white;
    }

    .form{
      margin-top:10px;
      margin-bottom:20px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      background:#1e293b;
      padding:16px;
      border-radius:12px;
    }

    input, select{
      padding:10px;
      border-radius:6px;
      border:none;
      min-width:180px;
    }

    .vazio{
      color:#94a3b8;
      font-style:italic;
    }

    @media (max-width: 700px){
      .linha{
        flex-direction:column;
        align-items:flex-start;
      }

      .acoes{
        width:100%;
      }

      .acoes button{
        flex:1;
      }

      .btn-geral{
        margin-left:0;
      }
    }
  </style>
</head>
<body>

<h1>📋 Maquinários</h1>

<button class="btn-add" onclick="abrirForm()">+ Adicionar Maquinário</button>
<button class="btn-geral" onclick="gerarTodosQRCodes()">Gerar todos os QR Codes</button>

<div class="form" id="form" style="display:none;">
  <select id="unidade">
    <option value="DUO HELIÓPOLIS">DUO HELIÓPOLIS</option>
    <option value="DUO CENTRO">DUO CENTRO</option>
  </select>

  <input id="id" placeholder="ID (ex: 101 ou centro-74)">
  <input id="nome" placeholder="Nome da máquina">

  <button class="btn-add" onclick="salvar()">Salvar</button>
</div>

<h2>🏋️ DUO HELIÓPOLIS</h2>
<div id="heliopolis" class="bloco"></div>

<h2>🏋️ DUO CENTRO</h2>
<div id="centro" class="bloco"></div>

<script>
  const supabaseClient = window.supabase.createClient(
    "https://chyomxetiloktyepjbtk.supabase.co",
    "sb_publishable_ZuuKIqmGotY08ZepHonxHg_3IOjs6pI"
  );

  function abrirForm(){
    const form = document.getElementById("form");
    form.style.display = form.style.display === "none" ? "flex" : "none";
  }

  async function salvar(){
    const unidade = document.getElementById("unidade").value;
    const id = document.getElementById("id").value.trim();
    const nome = document.getElementById("nome").value.trim();

    if(!id || !nome){
      alert("Preencha tudo");
      return;
    }

    const { error } = await supabaseClient
      .from("maquinarios")
      .insert([{ unidade, maquina_id: id, nome }]);

    if(error){
      console.log("Erro ao salvar:", error);
      alert("Erro ao salvar maquinário");
      return;
    }

    document.getElementById("id").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("form").style.display = "none";

    carregar();
  }

  function gerarQR(id){
    const url = `${location.origin}/manutencao-academia/maquina.html?id=${encodeURIComponent(id)}`;
    window.open(
      `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`,
      "_blank"
    );
  }

  async function carregar(){
    const { data, error } = await supabaseClient
      .from("maquinarios")
      .select("*")
      .order("nome");

    if(error){
      console.log("ERRO SUPABASE:", error);
      alert("Erro ao carregar maquinários");
      return;
    }

    const helio = document.getElementById("heliopolis");
    const centro = document.getElementById("centro");

    helio.innerHTML = "";
    centro.innerHTML = "";

    const heliopolis = data.filter(m => m.unidade === "DUO HELIÓPOLIS");
    const duoCentro = data.filter(m => m.unidade === "DUO CENTRO");

    if(heliopolis.length === 0){
      helio.innerHTML = `<div class="vazio">Nenhum maquinário cadastrado.</div>`;
    } else {
      heliopolis.forEach(m => {
        const div = document.createElement("div");
        div.className = "linha";

        div.innerHTML = `
          <div class="info">${m.maquina_id} - ${m.nome}</div>
          <div class="acoes">
            <button class="btn-qr" onclick="gerarQR('${m.maquina_id}')">QR</button>
          </div>
        `;

        helio.appendChild(div);
      });
    }

    if(duoCentro.length === 0){
      centro.innerHTML = `<div class="vazio">Nenhum maquinário cadastrado.</div>`;
    } else {
      duoCentro.forEach(m => {
        const div = document.createElement("div");
        div.className = "linha";

        div.innerHTML = `
          <div class="info">${m.maquina_id} - ${m.nome}</div>
          <div class="acoes">
            <button class="btn-qr" onclick="gerarQR('${m.maquina_id}')">QR</button>
          </div>
        `;

        centro.appendChild(div);
      });
    }
  }

  async function gerarTodosQRCodes(){
    const { data, error } = await supabaseClient
      .from("maquinarios")
      .select("*")
      .order("unidade")
      .order("nome");

    if(error){
      alert("Erro ao carregar maquinários para gerar os QR Codes.");
      console.log(error);
      return;
    }

    let html = `
      <!DOCTYPE html>
      <html lang="pt-BR">
      <head>
        <meta charset="UTF-8">
        <title>Todos os QR Codes</title>
        <style>
          body{
            font-family: Arial, sans-serif;
            margin:0;
            padding:20px;
            background:#f5f5f5;
          }

          .topo{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
          }

          .topo h1{
            font-size:24px;
            margin:0;
          }

          .topo button{
            padding:10px 16px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:#fff;
            font-weight:bold;
            cursor:pointer;
          }

          .pagina{
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:20px;
          }

          .card{
            background:#fff;
            border:1px solid #ccc;
            border-radius:16px;
            padding:16px;
            text-align:center;
            page-break-inside:avoid;
          }

          .unidade{
            font-size:12px;
            font-weight:bold;
            color:#666;
            margin-bottom:6px;
          }

          .nome{
            font-size:16px;
            font-weight:bold;
            margin-bottom:10px;
            min-height:48px;
          }

          .id{
            font-size:14px;
            color:#444;
            margin-bottom:12px;
          }

          img{
            width:180px;
            height:180px;
          }

          @media print{
            body{
              background:#fff;
            }

            .topo{
              display:none;
            }

            .pagina{
              gap:12px;
            }

            .card{
              border:1px solid #999;
              box-shadow:none;
            }
          }
        </style>
      </head>
      <body>
        <div class="topo">
          <h1>Todos os QR Codes</h1>
          <button onclick="window.print()">Imprimir</button>
        </div>
        <div class="pagina">
    `;

    data.forEach(m => {
      const url = `${location.origin}/manutencao-academia/maquina.html?id=${encodeURIComponent(m.maquina_id)}`;
      const qr = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;

      html += `
        <div class="card">
          <div class="unidade">${m.unidade}</div>
          <div class="nome">${m.nome}</div>
          <div class="id">ID: ${m.maquina_id}</div>
          <img src="${qr}" alt="QR Code">
        </div>
      `;
    });

    html += `
        </div>
      </body>
      </html>
    `;

    const novaJanela = window.open("", "_blank");
    novaJanela.document.open();
    novaJanela.document.write(html);
    novaJanela.document.close();
  }

  carregar();
</script>

</body>
</html>
