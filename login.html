<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Gestão - DUO</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      font-family:Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #dbeafe 0%, transparent 30%),
        radial-gradient(circle at top right, #e0e7ff 0%, transparent 28%),
        linear-gradient(135deg, #eef4ff 0%, #f7faff 100%);
      color:#0f172a;
    }

    .card{
      width:100%;
      max-width:430px;
      background:rgba(255,255,255,0.94);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.7);
      border-radius:24px;
      padding:28px 22px;
      box-shadow:0 20px 50px rgba(15,23,42,0.12);
    }

    .topo{
      text-align:center;
      margin-bottom:22px;
    }

    .topo .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      background:rgba(37,99,235,0.10);
      color:#2563eb;
      font-size:13px;
      font-weight:800;
      margin-bottom:14px;
    }

    .topo h1{
      font-size:32px;
      line-height:1.05;
      font-weight:900;
      letter-spacing:-0.8px;
      margin-bottom:8px;
    }

    .topo p{
      color:#64748b;
      font-size:15px;
      line-height:1.45;
    }

    .grupo{
      margin-top:14px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:800;
      color:#0f172a;
    }

    input{
      width:100%;
      border:1px solid #dbe4f0;
      outline:none;
      border-radius:16px;
      padding:15px 14px;
      font-size:16px;
      background:#fff;
      color:#0f172a;
    }

    input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 0.22rem rgba(59,130,246,0.14);
    }

    .botao{
      width:100%;
      margin-top:18px;
      border:none;
      border-radius:16px;
      padding:16px 18px;
      background:linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
      color:#fff;
      font-size:18px;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 14px 28px rgba(37,99,235,0.22);
      transition:transform .12s ease, filter .12s ease;
    }

    .botao:active{
      transform:scale(0.985);
      filter:brightness(0.98);
    }

    .mensagem{
      display:none;
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      font-weight:800;
      line-height:1.4;
    }

    .mensagem.erro{
      display:block;
      background:rgba(239,68,68,0.10);
      color:#b91c1c;
      border:1px solid rgba(239,68,68,0.18);
    }

    .rodape{
      text-align:center;
      margin-top:16px;
      color:#64748b;
      font-size:12px;
      line-height:1.4;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="topo">
      <div class="badge">🔐 Acesso restrito</div>
      <h1>Painel de Gestão</h1>
      <p>Entre com seu login para acessar a visão da diretoria.</p>
    </div>

    <div class="grupo">
      <label for="email">Login</label>
      <input id="email" type="email" placeholder="Digite o login">
    </div>

    <div class="grupo">
      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Digite a senha">
    </div>

    <button class="botao" onclick="entrar()">Entrar</button>

    <div id="msg" class="mensagem"></div>

    <div class="rodape">
      Sistema de gestão DUO Academia
    </div>
  </div>

<script>
  const LOGIN_CORRETO = "duoacademia@hotmail.com";
  const SENHA_CORRETA = "oudacademia4123";

  function mostrarErro(texto){
    const msg = document.getElementById("msg");
    msg.className = "mensagem erro";
    msg.textContent = texto;
  }

  function entrar(){
    const email = document.getElementById("email").value.trim().toLowerCase();
    const senha = document.getElementById("senha").value;

    if(!email || !senha){
      mostrarErro("Preencha login e senha.");
      return;
    }

    if(email !== LOGIN_CORRETO || senha !== SENHA_CORRETA){
      mostrarErro("Login ou senha incorretos.");
      return;
    }

    localStorage.setItem("duo_gestao_logado", "sim");
    window.location.href = "./painel.html?modo=gestao";
  }

  document.getElementById("senha").addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      entrar();
    }
  });
</script>

</body>
</html>
