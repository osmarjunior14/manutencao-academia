let manutencoes = []

async function carregar(){

const { data } = await supabaseClient
.from("manutencao-academia")
.select("*")
.order("data",{ascending:false})

manutencoes = data

render()

}

function render(){

let filtro = document.getElementById("filtro").value.toLowerCase()

let tabela = document.getElementById("tabela")

tabela.innerHTML=""

let abertas = 0

manutencoes.forEach(item=>{

const nome = maquinas[item.maquina_id] || "Máquina"
const maquina = nome + " - " + item.maquina_id

if(!maquina.toLowerCase().includes(filtro)) return

if(item.status==="aberto") abertas++

let statusCor = item.status==="aberto"
? `<span class="badge bg-danger">ABERTO</span>`
: `<span class="badge bg-success">RESOLVIDO</span>`

let botao = item.status==="aberto"
? `<button class="btn btn-sm btn-success" onclick="resolver('${item.id}')">Resolver</button>`
: ""

let linha = `
<tr>
<td>${maquina}</td>
<td>${item.descricao}</td>
<td>${new Date(item.data).toLocaleString()}</td>
<td>${statusCor}</td>
<td>${botao}</td>
</tr>
`

tabela.innerHTML+=linha

})

document.getElementById("contador").innerText = abertas

}

async function resolver(id){

const fotoInput = document.getElementById("fotoInput")

fotoInput.onchange = async function(){

let file = fotoInput.files[0]

let nomeArquivo = id + ".jpg"

await supabaseClient.storage
.from("manutencao")
.upload(nomeArquivo,file,{upsert:true})

await supabaseClient
.from("manutencao-academia")
.update({status:"resolvido"})
.eq("id",id)

alert("Manutenção resolvida!")

carregar()

}

fotoInput.click()

}

document.getElementById("filtro").addEventListener("input",render)

carregar()
