<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel de Manutenções</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{ background:#f4f6f9; font-family:Arial, sans-serif; }

    .card-maquina{ border-left:6px solid #dc3545; }
    .card-resolvido{ border-left:6px solid #28a745; }

    .botao{ width:100%; margin-top:6px; }
    .status-texto{ margin-top:8px; font-weight:bold; }

    .vazio{
      background:#fff; padding:16px; border-radius:10px;
      border:1px dashed #ccc; margin-bottom:12px;
    }

    .card-metrica{
      background:#1e293b; color:white;
      padding:12px 18px; border-radius:10px;
      font-weight:bold;
    }

    .card-dashboard{
      background:#fff; padding:16px;
      border-radius:10px; margin-bottom:20px;
    }

    .ranking-item{
      display:flex; justify-content:space-between;
      padding:8px 0; border-bottom:1px solid #eee;
    }
  </style>
</head>

<body>

<div class="container mt-3 mb-5">

<h3>Painel de Manutenções</h3>

<div id="dashboard" style="display:flex; gap:10px; flex-wrap:wrap;">
  <div class="card-metrica">Total: <span id="total">0</span></div>
  <div class="card-metrica">Abertos: <span id="abertos">0</span></div>
  <div class="card-metrica">Resolvidos: <span id="resolvidos">0</span></div>
  <div class="card-metrica">Tempo médio: <span id="tempoMedio">0h</span></div>
</div>

<br>

<select id="filtroUnidade" class="form-select mb-2">
  <option value="todas">Todas</option>
  <option value="heliopolis">Heliópolis</option>
  <option value="centro">Centro</option>
</select>

<input id="filtro" class="form-control mb-3" placeholder="Filtrar...">

<div class="card-dashboard">
  <h5>Problemas mais frequentes</h5>
  <div id="rankingProblemas"></div>
</div>

<h5>Em aberto</h5>
<div id="listaAbertos"></div>

<hr>

<h5>Resolvidos</h5>
<div id="listaResolvidos"></div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://chyomxetiloktyepjbtk.supabase.co",
  "sb_publishable_ZuuKIqmGotY08ZepHonxHg_3IOjs6pI"
);

const senhaAdmin = "7c9446a1";
const senhaResolver = "oud4123";

const tipos = {
  "cabo_rompido":"Cabo rompido",
  "barulho_anormal":"Barulho anormal",
  "outro":"Outro"
};

let dados = [];

async function carregar(){
  const { data } = await supabase
    .from("manutencao_academia")
    .select("*")
    .order("data", { ascending:false });

  dados = data || [];
  render();
}

function calcularMetricas(lista){
  const total = lista.length;
  const abertos = lista.filter(i => i.status === "aberto").length;
  const resolvidos = lista.filter(i => i.status === "resolvido").length;

  document.getElementById("total").innerText = total;
  document.getElementById("abertos").innerText = abertos;
  document.getElementById("resolvidos").innerText = resolvidos;

  const resolvidosValidos = lista.filter(i => i.data && i.data_resolucao);

  if(resolvidosValidos.length === 0){
    document.getElementById("tempoMedio").innerText = "0h";
    return;
  }

  let soma = 0;

  resolvidosValidos.forEach(i => {
    soma += new Date(i.data_resolucao) - new Date(i.data);
  });

  const media = soma / resolvidosValidos.length;
  const horas = media / (1000*60*60);

  document.getElementById("tempoMedio").innerText =
    horas < 24 ? horas.toFixed(1)+"h" : (horas/24).toFixed(1)+" dias";
}

function renderRanking(lista){
  const map = {};

  lista.forEach(i=>{
    const t = i.tipo_problema || "outro";
    map[t] = (map[t]||0)+1;
  });

  const ordenado = Object.entries(map).sort((a,b)=>b[1]-a[1]);

  document.getElementById("rankingProblemas").innerHTML =
    ordenado.map(([k,v])=>`
      <div class="ranking-item">
        <span>${tipos[k] || k}</span>
        <strong>${v}</strong>
      </div>
    `).join("");
}

function render(){

  const filtro = document.getElementById("filtro").value.toLowerCase();
  const unidade = document.getElementById("filtroUnidade").value;

  const lista = dados.filter(i=>{
    if(unidade==="centro" && !i.maquina_id.includes("centro-")) return false;
    if(unidade==="heliopolis" && i.maquina_id.includes("centro-")) return false;

    return (i.maquina_id+"").toLowerCase().includes(filtro);
  });

  calcularMetricas(lista);
  renderRanking(lista);

  const abertos = lista.filter(i=>i.status==="aberto");
  const resolvidos = lista.filter(i=>i.status==="resolvido");

  document.getElementById("listaAbertos").innerHTML =
    abertos.map(i=>card(i,true)).join("") || vazio();

  document.getElementById("listaResolvidos").innerHTML =
    resolvidos.map(i=>card(i,false)).join("") || vazio();
}

function card(i, aberto){
  return `
  <div class="card mb-2 ${aberto?"card-maquina":"card-resolvido"}">
    <div class="card-body">
      <h5>${i.maquina_id}</h5>
      <p>${tipos[i.tipo_problema] || i.tipo_problema}</p>
      <small>${new Date(i.data).toLocaleString()}</small>
      ${i.data_resolucao ? `<br><small>Resolvido: ${new Date(i.data_resolucao).toLocaleString()}</small>` : ""}

      ${aberto ? `
        <button class="btn btn-success botao" onclick="resolver('${i.id}')">Resolver</button>
      `:""}

      <button class="btn btn-danger botao" onclick="apagar('${i.id}')">Apagar</button>
    </div>
  </div>`;
}

function vazio(){
  return `<div class="vazio">Nada encontrado</div>`;
}

async function resolver(id){
  if(prompt("Senha") !== senhaResolver) return;

  await supabase
    .from("manutencao_academia")
    .update({
      status:"resolvido",
      data_resolucao:new Date().toISOString()
    })
    .eq("id", id);

  carregar();
}

async function apagar(id){
  if(prompt("Senha") !== senhaAdmin) return;

  await supabase
    .from("manutencao_academia")
    .delete()
    .eq("id", id);

  carregar();
}

document.getElementById("filtro").addEventListener("input", render);
document.getElementById("filtroUnidade").addEventListener("change", render);

carregar();

supabase.channel("rt")
.on("postgres_changes",{event:"*",schema:"public",table:"manutencao_academia"},()=>{
  carregar();
})
.subscribe();

</script>

</body>
</html>
