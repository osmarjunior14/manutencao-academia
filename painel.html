<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel de Manutenções</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      background:#f4f6f9;
      font-family:Arial, sans-serif;
    }

    .card-maquina{
      border-left:6px solid #dc3545;
    }

    .card-resolvido{
      border-left:6px solid #28a745;
    }

    .botao{
      width:100%;
      margin-top:6px;
    }

    .foto-conserto{
      width:100%;
      max-width:260px;
      border-radius:10px;
      margin-top:10px;
      border:1px solid #ddd;
      display:block;
    }

    .status-texto{
      display:inline-block;
      margin-top:8px;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="container mt-3 mb-5">

  <h3 class="mb-3">Painel de Manutenções</h3>

  <div class="card shadow mb-3">
    <div class="card-body text-center">
      <h5>Problemas em aberto</h5>
      <h1 id="contador">0</h1>
    </div>
  </div>

  <input
    class="form-control mb-3"
    placeholder="Filtrar máquina..."
    id="filtro"
  >

  <h5>Manutenções em aberto</h5>
  <div id="listaAbertos"></div>

  <hr>

  <h5>Histórico de manutenções resolvidas</h5>
  <div id="listaResolvidos"></div>

</div>

<input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none">

<script>

  const supabaseUrl = "https://chyomxetiloktyepjbtk.supabase.co";
  const supabaseKey = "sb_publishable_ZuuKIqmGotY08ZepHonxHg_3IOjs6pI";
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const bucketFotos = "manutencao";

  const maquinas = {

    "93":"AIR BIKE",

    "96":"CADEIRA ABDUTORA",

    "99":"ESTEIRA CURVA",
    "100":"SUPORTE PARA ELEVAÇÃO PÉLVICA"
  };

  let manutencoes = [];
  let idResolucaoAtual = null;

  async function carregar(){
    const { data, error } = await supabaseClient
      .from("manutencao_academia")
      .select("*")
      .order("data", { ascending:false });

    if(error){
      console.log("Erro ao carregar:", error);
      return;
    }

    manutencoes = data || [];
    render();
  }

  function render(){
    const filtro = document.getElementById("filtro").value.toLowerCase().trim();

    const listaAbertos = document.getElementById("listaAbertos");
    const listaResolvidos = document.getElementById("listaResolvidos");

    listaAbertos.innerHTML = "";
    listaResolvidos.innerHTML = "";

    let abertas = 0;

    manutencoes.forEach(item => {
      const nome = maquinas[item.maquina_id] || "Máquina";
      const maquina = nome + " - " + item.maquina_id;

      if(!maquina.toLowerCase().includes(filtro)) return;

      const statusNormalizado = String(item.status || "").toLowerCase().trim();
      const estaAberto = statusNormalizado === "aberto";
      const estaResolvido = statusNormalizado === "resolvido";

      const fotoHtml = item.foto_conserto
        ? `<div><img src="${item.foto_conserto}" alt="Foto do conserto" class="foto-conserto"></div>`
        : "";

      const statusHtml = estaAberto
        ? `<span class="badge bg-danger">ABERTO</span>`
        : `<span class="badge bg-success">RESOLVIDO</span>`;

      const botoesHtml = estaAberto
        ? `
          <button class="btn btn-success botao" onclick="resolver('${item.id}')">Resolver</button>
          <button class="btn btn-danger botao" onclick="apagar('${item.id}')">Apagar</button>
        `
        : `
          <button class="btn btn-danger botao" onclick="apagar('${item.id}')">Apagar</button>
        `;

      const card = `
        <div class="card mb-3 shadow ${estaAberto ? "card-maquina" : "card-resolvido"}">
          <div class="card-body">
            <h5>${maquina}</h5>
            <p class="mb-2">${item.descricao}</p>
            <small>${new Date(item.data).toLocaleString()}</small>
            <div class="status-texto">${statusHtml}</div>
            ${fotoHtml}
            <div class="mt-2">
              ${botoesHtml}
            </div>
          </div>
        </div>
      `;

      if(estaAberto){
        listaAbertos.innerHTML += card;
        abertas++;
      } else if(estaResolvido){
        listaResolvidos.innerHTML += card;
      }
    });

    document.getElementById("contador").innerText = abertas;
  }

  async function resolver(id){
    idResolucaoAtual = id;
    const fotoInput = document.getElementById("fotoInput");
    fotoInput.value = "";
    fotoInput.click();
  }

  document.getElementById("fotoInput").addEventListener("change", async function(){
    if(!idResolucaoAtual) return;

    const file = this.files[0];
    if(!file){
      idResolucaoAtual = null;
      return;
    }

    const extensaoOriginal = file.name && file.name.includes(".")
      ? file.name.split(".").pop().toLowerCase()
      : "";

    const extensao = extensaoOriginal || "jpg";
    const caminhoArquivo = `consertos/${idResolucaoAtual}_${Date.now()}.${extensao}`;

    const { error: uploadError } = await supabaseClient.storage
      .from(bucketFotos)
      .upload(caminhoArquivo, file, { upsert: false });

    if(uploadError){
      alert("Erro ao enviar foto do conserto: " + uploadError.message);
      console.log("Erro de upload:", uploadError);
      idResolucaoAtual = null;
      this.value = "";
      return;
    }

    const { data: publicUrlData } = supabaseClient.storage
      .from(bucketFotos)
      .getPublicUrl(caminhoArquivo);

    const urlFoto = publicUrlData.publicUrl;

    const { error: updateError } = await supabaseClient
      .from("manutencao_academia")
      .update({
        status: "resolvido",
        foto_conserto: urlFoto
      })
      .eq("id", idResolucaoAtual);

    if(updateError){
      alert("Erro ao marcar manutenção como resolvida: " + updateError.message);
      console.log("Erro ao atualizar registro:", updateError);
      idResolucaoAtual = null;
      this.value = "";
      return;
    }

    manutencoes = manutencoes.map(item =>
      item.id === idResolucaoAtual
        ? { ...item, status: "resolvido", foto_conserto: urlFoto }
        : item
    );

    render();
    alert("Manutenção resolvida com sucesso");
    carregar();

    idResolucaoAtual = null;
    this.value = "";
  });

  async function apagar(id){
    const senha = prompt("Digite a senha para apagar:");

    if(senha !== senhaAdmin){
      alert("Senha incorreta");
      return;
    }

    const confirmar = confirm("Tem certeza que deseja apagar este registro?");
    if(!confirmar) return;

    const { error } = await supabaseClient
      .from("manutencao_academia")
      .delete()
      .eq("id", id);

    if(error){
      alert("Erro ao apagar registro: " + error.message);
      console.log(error);
    } else {
      alert("Registro apagado com sucesso");
      carregar();
    }
  }

  document.getElementById("filtro").addEventListener("input", render);

  carregar();

  supabaseClient
    .channel("manutencao-realtime")
    .on(
      "postgres_changes",
      {
        event: "*",
        schema: "public",
        table: "manutencao_academia"
      },
      payload => {
        console.log("Atualização recebida:", payload);
        carregar();
      }
    )
    .subscribe();
</script>

</body>
</html>
