<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Painel de Manutenções</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">Painel de Manutenções</h2>

<div class="card shadow">

<div class="card-body">

<table class="table table-striped table-hover">

<thead class="table-dark">

<tr>
<th>Máquina</th>
<th>Problema</th>
<th>Data</th>
<th>Status</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

</div>

<script>

const supabaseUrl = "https://chyomxetiloktyepjbtk.supabase.co"
const supabaseKey = "sb_publishable_ZuuKIqmGotY08ZepHonxHg_3IOjs6pI"

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey)

async function carregar(){

const { data, error } = await supabaseClient
.from("manutencao-academia")
.select("*")
.order("data",{ascending:false})

let tabela = document.getElementById("tabela")

data.forEach(item=>{

let statusCor = item.status === "aberto"
? `<span class="badge bg-danger">ABERTO</span>`
: `<span class="badge bg-success">RESOLVIDO</span>`

let linha = `
<tr>
<td>${item.maquina_id}</td>
<td>${item.descricao}</td>
<td>${new Date(item.data).toLocaleString()}</td>
<td>${statusCor}</td>
</tr>
`

tabela.innerHTML += linha

})

}

carregar()

</script>

</body>
</html>
